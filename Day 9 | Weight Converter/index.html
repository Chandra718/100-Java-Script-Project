<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Day 9 | Weight Converter</title>
</head>
<body>
    <div class="container">
        <!-- Heading of the project -->
        <h1 class="heading">Weight Converter</h1>
        <div class="input-container">
        <!-- Taking input from user -->
            <label for="pounds">Pounds</label>
            <input type="number" id="input" class="input" step=".1" placeholder="Enter Number">
        </div>
        <!-- Giving Output -->
        <p>Weight in kg is: <span id="result"></span></p>
        <p class="error" id="error"></p>
    </div>
<script src="script.js"></script>
</body>
</html>
